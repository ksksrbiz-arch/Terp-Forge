name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only run one deploy at a time. New pushes cancel any in-flight deploy.
concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (static export)
        run: npm run build
        env:
          # Disable Next telemetry in CI for cleaner logs.
          NEXT_TELEMETRY_DISABLED: 1

      - name: Verify static export output exists
        run: |
          if [ ! -d "out" ]; then
            echo "::error::next build did not produce an 'out' directory."
            echo "Make sure next.config.ts has output: 'export'."
            exit 1
          fi
          echo "Static export contains $(find out -type f | wc -l) files."

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@392082e81fbedc8b04d89cbaca5ddf3c4e307b67 # v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy out
            --project-name=terpforge
            --branch=${{ github.ref_name }}
            --commit-hash=${{ github.sha }}
            --commit-message=${{ github.event.head_commit.message || github.sha }}
