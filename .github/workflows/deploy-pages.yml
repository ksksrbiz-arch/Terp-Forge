name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one deploy in flight at a time. Don't cancel — Pages deployments
# need to complete cleanly so the live site is never left in a bad state.
concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (static export)
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Verify static export output exists
        run: |
          if [ ! -d "out" ]; then
            echo "::error::next build did not produce an 'out' directory."
            echo "Make sure next.config.ts has output: 'export'."
            exit 1
          fi
          if [ ! -f "out/CNAME" ]; then
            echo "::error::out/CNAME is missing. Add public/CNAME so GitHub Pages keeps the custom domain."
            exit 1
          fi
          echo "Static export contains $(find out -type f | wc -l) files."

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: out

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
