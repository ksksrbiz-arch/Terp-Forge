<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600"
     role="img" aria-label="Focus Protocol Tincture — TerpForge technical schematic"
     preserveAspectRatio="xMidYMid slice">
  <!-- BACKGROUND -->
  <rect width="800" height="600" fill="#0A1628" />
  <defs>
    <pattern id="grid-tf-wl-001" x="0" y="0" width="40" height="40"
             patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none"
            stroke="#0D9488" stroke-opacity="0.08" stroke-width="1" />
    </pattern>
    <radialGradient id="vignette-tf-wl-001" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#0F1F3D" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#0A1628" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="accent-tf-wl-001" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0.55" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#grid-tf-wl-001)" />
  <rect width="800" height="600" fill="url(#vignette-tf-wl-001)" />

  <!-- CORNER REGISTRATION BRACKETS -->
  <g stroke="#C9A84C" stroke-width="2" fill="none">
    <path d="M 24 24 L 24 56 M 24 24 L 56 24" />
    <path d="M 776 24 L 776 56 M 776 24 L 744 24" />
    <path d="M 24 576 L 24 544 M 24 576 L 56 576" />
    <path d="M 776 576 L 776 544 M 776 576 L 744 576" />
  </g>

  <!-- HEADER STRIP -->
  <g font-family="ui-monospace, 'SF Mono', monospace" letter-spacing="2">
    <text x="36" y="50" font-size="10" font-weight="700" fill="#C9A84C">
      TF-SCHEMATIC // TF-WL-001
    </text>
    <text x="36" y="68" font-size="10" fill="#64748B">
      1000mg CBD · Limonene-Dominant Terpene Profile
    </text>
  </g>
  <g transform="translate(640, 36)">
    <rect width="124" height="22" fill="#C9A84C" />
    <text x="62" y="15" text-anchor="middle"
          font-family="ui-monospace, 'SF Mono', monospace"
          font-size="10" font-weight="700" letter-spacing="1.6"
          fill="#0A1628">COA VERIFIED</text>
  </g>

  <!-- ICON STAMP -->
  <g transform="translate(36, 90)">
    <rect width="36" height="36" fill="none" stroke="#C9A84C" stroke-opacity="0.4" />
    <text x="18" y="26" text-anchor="middle" font-size="20" fill="#C9A84C">◉</text>
  </g>

  <!-- PRODUCT SILHOUETTE -->
  
  <!-- DROPPER + BOTTLE -->
  <g transform="translate(330, 130)" stroke="#C9A84C" stroke-width="2.2"
     fill="none" stroke-linejoin="round">
    <!-- BULB -->
    <ellipse cx="70" cy="30" rx="34" ry="22" fill="#C9A84C" fill-opacity="0.18" />
    <!-- DROPPER NECK -->
    <rect x="56" y="50" width="28" height="20" fill="#0F1F3D" />
    <!-- THREAD -->
    <rect x="44" y="70" width="52" height="18" fill="#0F1F3D" />
    <line x1="44" y1="78" x2="96" y2="78" stroke-opacity="0.5" />
    <!-- BOTTLE -->
    <path d="M 30 88 L 110 88 L 122 110 L 122 280 Q 70 296 18 280 L 18 110 Z"
          fill="#C9A84C" fill-opacity="0.14" />
    <!-- LABEL -->
    <rect x="22" y="148" width="96" height="98" fill="#0A1628" stroke="#C9A84C" stroke-opacity="0.6" />
    <text x="70" y="172" text-anchor="middle"
          font-family="'Helvetica Neue', Arial, sans-serif"
          font-weight="800" font-size="13" fill="#C9A84C" letter-spacing="2">FOCUS</text>
    <line x1="32" y1="178" x2="108" y2="178" stroke="#C9A84C" stroke-opacity="0.4" />
    <text x="70" y="200" text-anchor="middle"
          font-family="ui-monospace, 'SF Mono', monospace"
          font-size="11" fill="#E8EDF5" letter-spacing="1.6">1000mg</text>
    <text x="70" y="220" text-anchor="middle"
          font-family="ui-monospace, 'SF Mono', monospace"
          font-size="9" fill="#64748B" letter-spacing="2">CBD · MCT</text>
    <text x="70" y="238" text-anchor="middle"
          font-family="ui-monospace, 'SF Mono', monospace"
          font-size="9" fill="#C9A84C" letter-spacing="2">LIMONENE</text>
    <!-- DROP INSIDE -->
    <path d="M 70 268 q -8 -16 0 -28 q 8 12 0 28 z" fill="#C9A84C" fill-opacity="0.55" />
  </g>

  <!-- COA STAMP -->
  <g transform="translate(130, 280)" font-family="ui-monospace, 'SF Mono', monospace">
    <circle cx="40" cy="40" r="38" fill="none" stroke="#C9A84C" stroke-width="1.6" />
    <text x="40" y="34" text-anchor="middle" font-size="9" fill="#C9A84C" letter-spacing="2">COA</text>
    <text x="40" y="46" text-anchor="middle" font-size="9" fill="#C9A84C" letter-spacing="2">VERIFIED</text>
    <text x="40" y="58" text-anchor="middle" font-size="8" fill="#64748B" letter-spacing="2">3rd PARTY</text>
  </g>

  <g font-family="ui-monospace, 'SF Mono', monospace" font-size="10"
     letter-spacing="1.4">
    <text x="540" y="220" fill="#C9A84C">FOCUS PROTOCOL</text>
    <text x="540" y="240" fill="#64748B">1000mg · MCT CARRIER</text>
    <text x="540" y="270" fill="#C9A84C">LIMONENE DOMINANT</text>
    <text x="540" y="290" fill="#64748B">&lt; 0.001% THC</text>
    <text x="540" y="320" fill="#64748B">3rd-PARTY LAB VERIFIED</text>
  </g>


  <!-- FOOTER STRIP -->
  <g font-family="ui-monospace, 'SF Mono', monospace" letter-spacing="2">
    <text x="36" y="514" font-size="9" fill="#64748B">
      ENGINEERED // FORGED // VERIFIED
    </text>
  </g>
  <g transform="translate(36, 540)">
    <rect width="86" height="20" fill="none" stroke="#C9A84C" stroke-opacity="0.5" />
    <text x="43" y="14" text-anchor="middle"
          font-family="ui-monospace, 'SF Mono', monospace"
          font-size="10" font-weight="700" letter-spacing="2"
          fill="#C9A84C">FOCUS</text>
  </g>

  <!-- TF MONOGRAM -->
  <g transform="translate(710, 530)">
    <rect width="54" height="36" fill="none" stroke="#C9A84C" stroke-opacity="0.6" />
    <text x="27" y="24" text-anchor="middle"
          font-family="'Helvetica Neue', Arial, sans-serif"
          font-size="14" font-weight="800" letter-spacing="3"
          fill="#C9A84C">TF</text>
  </g>

  <!-- DIM LINE TICKERS -->
  <g stroke="#0D9488" stroke-opacity="0.35" stroke-width="1">
    <line x1="36" y1="140" x2="36" y2="490" />
    <line x1="32" y1="140" x2="40" y2="140" />
    <line x1="32" y1="315" x2="40" y2="315" />
    <line x1="32" y1="490" x2="40" y2="490" />
    <line x1="764" y1="140" x2="764" y2="490" />
    <line x1="760" y1="140" x2="768" y2="140" />
    <line x1="760" y1="315" x2="768" y2="315" />
    <line x1="760" y1="490" x2="768" y2="490" />
  </g>
</svg>
