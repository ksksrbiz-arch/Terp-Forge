<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600"
     role="img" aria-label="TerpTemp Monitor Pro — TerpForge technical schematic"
     preserveAspectRatio="xMidYMid slice">
  <!-- BACKGROUND -->
  <rect width="800" height="600" fill="#0A1628" />
  <defs>
    <pattern id="grid-tf-hw-004" x="0" y="0" width="40" height="40"
             patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none"
            stroke="#0D9488" stroke-opacity="0.08" stroke-width="1" />
    </pattern>
    <radialGradient id="vignette-tf-hw-004" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#0F1F3D" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#0A1628" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="accent-tf-hw-004" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0.55" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#grid-tf-hw-004)" />
  <rect width="800" height="600" fill="url(#vignette-tf-hw-004)" />

  <!-- CORNER REGISTRATION BRACKETS -->
  <g stroke="#C9A84C" stroke-width="2" fill="none">
    <path d="M 24 24 L 24 56 M 24 24 L 56 24" />
    <path d="M 776 24 L 776 56 M 776 24 L 744 24" />
    <path d="M 24 576 L 24 544 M 24 576 L 56 576" />
    <path d="M 776 576 L 776 544 M 776 576 L 744 576" />
  </g>

  <!-- HEADER STRIP -->
  <g font-family="ui-monospace, 'SF Mono', monospace" letter-spacing="2">
    <text x="36" y="50" font-size="10" font-weight="700" fill="#C9A84C">
      TF-SCHEMATIC // TF-HW-004
    </text>
    <text x="36" y="68" font-size="10" fill="#64748B">
      Digital Precision ±0.1°C · Bluetooth Sync · Waterproof
    </text>
  </g>
  <g transform="translate(640, 36)">
    <rect width="124" height="22" fill="#C9A84C" />
    <text x="62" y="15" text-anchor="middle"
          font-family="ui-monospace, 'SF Mono', monospace"
          font-size="10" font-weight="700" letter-spacing="1.6"
          fill="#0A1628">NEW</text>
  </g>

  <!-- ICON STAMP -->
  <g transform="translate(36, 90)">
    <rect width="36" height="36" fill="none" stroke="#C9A84C" stroke-opacity="0.4" />
    <text x="18" y="26" text-anchor="middle" font-size="20" fill="#C9A84C">⬡</text>
  </g>

  <!-- PRODUCT SILHOUETTE -->
  
  <!-- DIGITAL DISPLAY UNIT -->
  <g transform="translate(220, 150)" stroke="#C9A84C" stroke-width="2.2"
     fill="none" stroke-linejoin="round">
    <rect x="0" y="0" width="220" height="160" rx="10"
          fill="#0F1F3D" fill-opacity="0.6" />
    <!-- LCD -->
    <rect x="20" y="20" width="180" height="80" fill="#0A1628" stroke="#0D9488" stroke-opacity="0.6" />
    <text x="110" y="76" text-anchor="middle"
          font-family="ui-monospace, 'SF Mono', monospace"
          font-size="36" font-weight="700" fill="#0D9488" letter-spacing="2">42.7°</text>
    <text x="110" y="94" text-anchor="middle"
          font-family="ui-monospace, 'SF Mono', monospace"
          font-size="9" fill="#64748B" letter-spacing="2">PROBE 01 · LIVE</text>
    <!-- BUTTONS -->
    <circle cx="40" cy="130" r="10" fill="#0A1628" />
    <circle cx="80" cy="130" r="10" fill="#0A1628" />
    <circle cx="180" cy="130" r="10" fill="#C9A84C" fill-opacity="0.2" />
    <text x="40" y="134" text-anchor="middle"
          font-family="ui-monospace, 'SF Mono', monospace"
          font-size="10" fill="#64748B">−</text>
    <text x="80" y="134" text-anchor="middle"
          font-family="ui-monospace, 'SF Mono', monospace"
          font-size="10" fill="#64748B">+</text>
    <text x="180" y="135" text-anchor="middle"
          font-family="ui-monospace, 'SF Mono', monospace"
          font-size="9" fill="#C9A84C" font-weight="700">BT</text>
  </g>

  <!-- PROBE (with cable) -->
  <g stroke="#C9A84C" stroke-width="2" fill="none">
    <path d="M 440 230 Q 530 230 540 320 Q 550 410 480 430" />
    <line x1="476" y1="426" x2="476" y2="466" stroke-width="3" />
    <circle cx="476" cy="470" r="4" fill="#C9A84C" />
  </g>

  <g font-family="ui-monospace, 'SF Mono', monospace" font-size="10"
     letter-spacing="1.4">
    <text x="260" y="350" fill="#C9A84C">±0.1°C ACCURACY</text>
    <text x="260" y="370" fill="#64748B">IP67 WATERPROOF</text>
    <text x="260" y="390" fill="#0D9488">BLUETOOTH 5.0</text>
    <text x="260" y="410" fill="#64748B">−50°C → +300°C</text>
  </g>


  <!-- FOOTER STRIP -->
  <g font-family="ui-monospace, 'SF Mono', monospace" letter-spacing="2">
    <text x="36" y="514" font-size="9" fill="#64748B">
      ENGINEERED // FORGED // VERIFIED
    </text>
  </g>

  <!-- TF MONOGRAM -->
  <g transform="translate(710, 530)">
    <rect width="54" height="36" fill="none" stroke="#C9A84C" stroke-opacity="0.6" />
    <text x="27" y="24" text-anchor="middle"
          font-family="'Helvetica Neue', Arial, sans-serif"
          font-size="14" font-weight="800" letter-spacing="3"
          fill="#C9A84C">TF</text>
  </g>

  <!-- DIM LINE TICKERS -->
  <g stroke="#0D9488" stroke-opacity="0.35" stroke-width="1">
    <line x1="36" y1="140" x2="36" y2="490" />
    <line x1="32" y1="140" x2="40" y2="140" />
    <line x1="32" y1="315" x2="40" y2="315" />
    <line x1="32" y1="490" x2="40" y2="490" />
    <line x1="764" y1="140" x2="764" y2="490" />
    <line x1="760" y1="140" x2="768" y2="140" />
    <line x1="760" y1="315" x2="768" y2="315" />
    <line x1="760" y1="490" x2="768" y2="490" />
  </g>
</svg>
