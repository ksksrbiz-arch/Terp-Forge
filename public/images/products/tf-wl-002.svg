<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600"
     role="img" aria-label="Recovery Protocol Gummies — TerpForge technical schematic"
     preserveAspectRatio="xMidYMid slice">
  <!-- BACKGROUND -->
  <rect width="800" height="600" fill="#0A1628" />
  <defs>
    <pattern id="grid-tf-wl-002" x="0" y="0" width="40" height="40"
             patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none"
            stroke="#0D9488" stroke-opacity="0.08" stroke-width="1" />
    </pattern>
    <radialGradient id="vignette-tf-wl-002" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#0F1F3D" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#0A1628" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="accent-tf-wl-002" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0D9488" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#0D9488" stop-opacity="0.55" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#grid-tf-wl-002)" />
  <rect width="800" height="600" fill="url(#vignette-tf-wl-002)" />

  <!-- CORNER REGISTRATION BRACKETS -->
  <g stroke="#C9A84C" stroke-width="2" fill="none">
    <path d="M 24 24 L 24 56 M 24 24 L 56 24" />
    <path d="M 776 24 L 776 56 M 776 24 L 744 24" />
    <path d="M 24 576 L 24 544 M 24 576 L 56 576" />
    <path d="M 776 576 L 776 544 M 776 576 L 744 576" />
  </g>

  <!-- HEADER STRIP -->
  <g font-family="ui-monospace, 'SF Mono', monospace" letter-spacing="2">
    <text x="36" y="50" font-size="10" font-weight="700" fill="#C9A84C">
      TF-SCHEMATIC // TF-WL-002
    </text>
    <text x="36" y="68" font-size="10" fill="#64748B">
      25mg CBD/ea · Myrcene Profile · 30-Count
    </text>
  </g>
  <g transform="translate(640, 36)">
    <rect width="124" height="22" fill="#C9A84C" />
    <text x="62" y="15" text-anchor="middle"
          font-family="ui-monospace, 'SF Mono', monospace"
          font-size="10" font-weight="700" letter-spacing="1.6"
          fill="#0A1628">COA VERIFIED</text>
  </g>

  <!-- ICON STAMP -->
  <g transform="translate(36, 90)">
    <rect width="36" height="36" fill="none" stroke="#C9A84C" stroke-opacity="0.4" />
    <text x="18" y="26" text-anchor="middle" font-size="20" fill="#C9A84C">◉</text>
  </g>

  <!-- PRODUCT SILHOUETTE -->
  
  <!-- POUCH (stand-up) -->
  <g transform="translate(280, 140)" stroke="#C9A84C" stroke-width="2.2"
     fill="none" stroke-linejoin="round">
    <path d="M 0 30 L 0 320 L 240 320 L 240 30 L 220 0 L 20 0 Z"
          fill="#0F1F3D" fill-opacity="0.7" />
    <!-- ZIPPER -->
    <line x1="10" y1="40" x2="230" y2="40" stroke-dasharray="3 3" stroke-opacity="0.6" />
    <!-- LABEL BAND -->
    <rect x="20" y="80" width="200" height="60" fill="#0A1628" stroke="#0D9488" stroke-opacity="0.6" />
    <text x="120" y="106" text-anchor="middle"
          font-family="'Helvetica Neue', Arial, sans-serif"
          font-weight="800" font-size="15" fill="#0D9488" letter-spacing="3">RECOVERY</text>
    <text x="120" y="124" text-anchor="middle"
          font-family="ui-monospace, 'SF Mono', monospace"
          font-size="9" fill="#64748B" letter-spacing="2">MYRCENE C₁₀H₁₆ · 25mg/ea · 30ct</text>
    <!-- WINDOW SHOWING GUMMIES -->
    <rect x="20" y="160" width="200" height="140" fill="#0A1628" stroke="#C9A84C" stroke-opacity="0.4" />
  </g>

  <!-- GUMMIES INSIDE WINDOW (window spans 300..500 in page coords; rows fit within 160..300 → 300..440 page-y) -->
  <g fill="#0D9488" fill-opacity="0.72">
    <rect x="312" y="306" width="30" height="30" rx="7" />
    <rect x="350" y="302" width="30" height="30" rx="7" />
    <rect x="388" y="308" width="30" height="30" rx="7" />
    <rect x="426" y="304" width="30" height="30" rx="7" />
    <rect x="464" y="308" width="30" height="30" rx="7" />
    <rect x="312" y="346" width="30" height="30" rx="7" />
    <rect x="350" y="350" width="30" height="30" rx="7" />
    <rect x="388" y="346" width="30" height="30" rx="7" />
    <rect x="426" y="350" width="30" height="30" rx="7" />
    <rect x="464" y="346" width="30" height="30" rx="7" />
    <rect x="312" y="386" width="30" height="30" rx="7" />
    <rect x="350" y="390" width="30" height="30" rx="7" />
    <rect x="388" y="388" width="30" height="30" rx="7" />
    <rect x="426" y="390" width="30" height="30" rx="7" />
    <rect x="464" y="388" width="30" height="30" rx="7" />
  </g>

  <g font-family="ui-monospace, 'SF Mono', monospace" font-size="10"
     letter-spacing="1.4">
    <text x="540" y="180" fill="#0D9488">RECOVERY · MYRCENE</text>
    <text x="540" y="200" fill="#64748B">PECTIN BASE · VEGAN</text>
    <text x="540" y="220" fill="#C9A84C">750mg CBD TOTAL</text>
  </g>


  <!-- FOOTER STRIP -->
  <g font-family="ui-monospace, 'SF Mono', monospace" letter-spacing="2">
    <text x="36" y="514" font-size="9" fill="#64748B">
      ENGINEERED // FORGED // VERIFIED
    </text>
  </g>
  <g transform="translate(36, 540)">
    <rect width="86" height="20" fill="none" stroke="#0D9488" stroke-opacity="0.5" />
    <text x="43" y="14" text-anchor="middle"
          font-family="ui-monospace, 'SF Mono', monospace"
          font-size="10" font-weight="700" letter-spacing="2"
          fill="#0D9488">RECOVERY</text>
  </g>

  <!-- TF MONOGRAM -->
  <g transform="translate(710, 530)">
    <rect width="54" height="36" fill="none" stroke="#C9A84C" stroke-opacity="0.6" />
    <text x="27" y="24" text-anchor="middle"
          font-family="'Helvetica Neue', Arial, sans-serif"
          font-size="14" font-weight="800" letter-spacing="3"
          fill="#C9A84C">TF</text>
  </g>

  <!-- DIM LINE TICKERS -->
  <g stroke="#0D9488" stroke-opacity="0.35" stroke-width="1">
    <line x1="36" y1="140" x2="36" y2="490" />
    <line x1="32" y1="140" x2="40" y2="140" />
    <line x1="32" y1="315" x2="40" y2="315" />
    <line x1="32" y1="490" x2="40" y2="490" />
    <line x1="764" y1="140" x2="764" y2="490" />
    <line x1="760" y1="140" x2="768" y2="140" />
    <line x1="760" y1="315" x2="768" y2="315" />
    <line x1="760" y1="490" x2="768" y2="490" />
  </g>
</svg>
