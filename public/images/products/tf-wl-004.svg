<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600"
     role="img" aria-label="The Terpene Stack — Trial Kit — TerpForge technical schematic"
     preserveAspectRatio="xMidYMid slice">
  <!-- BACKGROUND -->
  <rect width="800" height="600" fill="#0A1628" />
  <defs>
    <pattern id="grid-tf-wl-004" x="0" y="0" width="40" height="40"
             patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none"
            stroke="#0D9488" stroke-opacity="0.08" stroke-width="1" />
    </pattern>
    <radialGradient id="vignette-tf-wl-004" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#0F1F3D" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#0A1628" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="accent-tf-wl-004" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0.55" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#grid-tf-wl-004)" />
  <rect width="800" height="600" fill="url(#vignette-tf-wl-004)" />

  <!-- CORNER REGISTRATION BRACKETS -->
  <g stroke="#C9A84C" stroke-width="2" fill="none">
    <path d="M 24 24 L 24 56 M 24 24 L 56 24" />
    <path d="M 776 24 L 776 56 M 776 24 L 744 24" />
    <path d="M 24 576 L 24 544 M 24 576 L 56 576" />
    <path d="M 776 576 L 776 544 M 776 576 L 744 576" />
  </g>

  <!-- HEADER STRIP -->
  <g font-family="ui-monospace, 'SF Mono', monospace" letter-spacing="2">
    <text x="36" y="50" font-size="10" font-weight="700" fill="#C9A84C">
      TF-SCHEMATIC // TF-WL-004
    </text>
    <text x="36" y="68" font-size="10" fill="#64748B">
      3×10mL Tinctures · All 3 Profiles · COA Included
    </text>
  </g>
  <g transform="translate(640, 36)">
    <rect width="124" height="22" fill="#C9A84C" />
    <text x="62" y="15" text-anchor="middle"
          font-family="ui-monospace, 'SF Mono', monospace"
          font-size="10" font-weight="700" letter-spacing="1.6"
          fill="#0A1628">STARTER KIT</text>
  </g>

  <!-- ICON STAMP -->
  <g transform="translate(36, 90)">
    <rect width="36" height="36" fill="none" stroke="#C9A84C" stroke-opacity="0.4" />
    <text x="18" y="26" text-anchor="middle" font-size="20" fill="#C9A84C">◉</text>
  </g>

  <!-- PRODUCT SILHOUETTE -->
  
  <!-- 3 MINI BOTTLES IN A ROW -->
  <g stroke="#C9A84C" stroke-width="2" fill="none" stroke-linejoin="round">
    <!-- FOCUS (gold) -->
    <g transform="translate(220, 200)">
      <ellipse cx="40" cy="14" rx="18" ry="11" fill="#C9A84C" fill-opacity="0.2" />
      <rect x="30" y="24" width="20" height="14" fill="#0F1F3D" />
      <path d="M 18 38 L 62 38 L 70 58 L 70 220 Q 40 230 10 220 L 10 58 Z"
            fill="#C9A84C" fill-opacity="0.14" />
      <rect x="14" y="86" width="52" height="86" fill="#0A1628" stroke="#C9A84C" stroke-opacity="0.6" />
      <text x="40" y="110" text-anchor="middle"
            font-family="'Helvetica Neue', Arial, sans-serif"
            font-weight="800" font-size="11" fill="#C9A84C" letter-spacing="2">FOCUS</text>
      <text x="40" y="132" text-anchor="middle"
            font-family="ui-monospace, 'SF Mono', monospace"
            font-size="8" fill="#E8EDF5" letter-spacing="1">10mL</text>
      <text x="40" y="154" text-anchor="middle"
            font-family="ui-monospace, 'SF Mono', monospace"
            font-size="8" fill="#C9A84C" letter-spacing="1">LIMONENE</text>
    </g>
    <!-- RECOVERY (teal) -->
    <g transform="translate(360, 200)">
      <ellipse cx="40" cy="14" rx="18" ry="11" fill="#0D9488" fill-opacity="0.22" />
      <rect x="30" y="24" width="20" height="14" fill="#0F1F3D" />
      <path d="M 18 38 L 62 38 L 70 58 L 70 220 Q 40 230 10 220 L 10 58 Z"
            fill="#0D9488" fill-opacity="0.16" />
      <rect x="14" y="86" width="52" height="86" fill="#0A1628" stroke="#0D9488" stroke-opacity="0.6" />
      <text x="40" y="108" text-anchor="middle"
            font-family="'Helvetica Neue', Arial, sans-serif"
            font-weight="800" font-size="9" fill="#0D9488" letter-spacing="2">RECOVERY</text>
      <text x="40" y="132" text-anchor="middle"
            font-family="ui-monospace, 'SF Mono', monospace"
            font-size="8" fill="#E8EDF5" letter-spacing="1">10mL</text>
      <text x="40" y="154" text-anchor="middle"
            font-family="ui-monospace, 'SF Mono', monospace"
            font-size="8" fill="#0D9488" letter-spacing="1">MYRCENE</text>
    </g>
    <!-- CALM (blue) -->
    <g transform="translate(500, 200)">
      <ellipse cx="40" cy="14" rx="18" ry="11" fill="#2563EB" fill-opacity="0.22" />
      <rect x="30" y="24" width="20" height="14" fill="#0F1F3D" />
      <path d="M 18 38 L 62 38 L 70 58 L 70 220 Q 40 230 10 220 L 10 58 Z"
            fill="#2563EB" fill-opacity="0.16" />
      <rect x="14" y="86" width="52" height="86" fill="#0A1628" stroke="#2563EB" stroke-opacity="0.6" />
      <text x="40" y="110" text-anchor="middle"
            font-family="'Helvetica Neue', Arial, sans-serif"
            font-weight="800" font-size="11" fill="#2563EB" letter-spacing="2">CALM</text>
      <text x="40" y="132" text-anchor="middle"
            font-family="ui-monospace, 'SF Mono', monospace"
            font-size="8" fill="#E8EDF5" letter-spacing="1">10mL</text>
      <text x="40" y="154" text-anchor="middle"
            font-family="ui-monospace, 'SF Mono', monospace"
            font-size="8" fill="#2563EB" letter-spacing="1">LINALOOL</text>
    </g>
  </g>

  <g font-family="ui-monospace, 'SF Mono', monospace" font-size="10"
     letter-spacing="1.4">
    <text x="220" y="180" fill="#C9A84C">THE TERPENE STACK · TRIAL KIT</text>
    <text x="220" y="450" fill="#64748B">PROFILE YOUR RESPONSE TO EACH TERPENE VARIANT</text>
    <text x="220" y="470" fill="#0D9488">3 × 10mL · COA INCLUDED</text>
  </g>


  <!-- FOOTER STRIP -->
  <g font-family="ui-monospace, 'SF Mono', monospace" letter-spacing="2">
    <text x="36" y="514" font-size="9" fill="#64748B">
      ENGINEERED // FORGED // VERIFIED
    </text>
  </g>

  <!-- TF MONOGRAM -->
  <g transform="translate(710, 530)">
    <rect width="54" height="36" fill="none" stroke="#C9A84C" stroke-opacity="0.6" />
    <text x="27" y="24" text-anchor="middle"
          font-family="'Helvetica Neue', Arial, sans-serif"
          font-size="14" font-weight="800" letter-spacing="3"
          fill="#C9A84C">TF</text>
  </g>

  <!-- DIM LINE TICKERS -->
  <g stroke="#0D9488" stroke-opacity="0.35" stroke-width="1">
    <line x1="36" y1="140" x2="36" y2="490" />
    <line x1="32" y1="140" x2="40" y2="140" />
    <line x1="32" y1="315" x2="40" y2="315" />
    <line x1="32" y1="490" x2="40" y2="490" />
    <line x1="764" y1="140" x2="764" y2="490" />
    <line x1="760" y1="140" x2="768" y2="140" />
    <line x1="760" y1="315" x2="768" y2="315" />
    <line x1="760" y1="490" x2="768" y2="490" />
  </g>
</svg>
