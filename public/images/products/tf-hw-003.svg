<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600"
     role="img" aria-label="Extraction Field Kit — TerpForge technical schematic"
     preserveAspectRatio="xMidYMid slice">
  <!-- BACKGROUND -->
  <rect width="800" height="600" fill="#0A1628" />
  <defs>
    <pattern id="grid-tf-hw-003" x="0" y="0" width="40" height="40"
             patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none"
            stroke="#0D9488" stroke-opacity="0.08" stroke-width="1" />
    </pattern>
    <radialGradient id="vignette-tf-hw-003" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#0F1F3D" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#0A1628" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="accent-tf-hw-003" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0.55" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#grid-tf-hw-003)" />
  <rect width="800" height="600" fill="url(#vignette-tf-hw-003)" />

  <!-- CORNER REGISTRATION BRACKETS -->
  <g stroke="#C9A84C" stroke-width="2" fill="none">
    <path d="M 24 24 L 24 56 M 24 24 L 56 24" />
    <path d="M 776 24 L 776 56 M 776 24 L 744 24" />
    <path d="M 24 576 L 24 544 M 24 576 L 56 576" />
    <path d="M 776 576 L 776 544 M 776 576 L 744 576" />
  </g>

  <!-- HEADER STRIP -->
  <g font-family="ui-monospace, 'SF Mono', monospace" letter-spacing="2">
    <text x="36" y="50" font-size="10" font-weight="700" fill="#C9A84C">
      TF-SCHEMATIC // TF-HW-003
    </text>
    <text x="36" y="68" font-size="10" fill="#64748B">
      7-Piece Set · Stainless Tools · Roll Case Included
    </text>
  </g>

  <!-- ICON STAMP -->
  <g transform="translate(36, 90)">
    <rect width="36" height="36" fill="none" stroke="#C9A84C" stroke-opacity="0.4" />
    <text x="18" y="26" text-anchor="middle" font-size="20" fill="#C9A84C">⬡</text>
  </g>

  <!-- PRODUCT SILHOUETTE -->
  
  <!-- ROLL CASE (open, showing tools) -->
  <g transform="translate(160, 220)" stroke="#C9A84C" stroke-width="2"
     fill="none" stroke-linejoin="round">
    <rect x="0" y="0" width="480" height="170" rx="6"
          fill="#0F1F3D" fill-opacity="0.5" />
    <line x1="60" y1="0" x2="60" y2="170" stroke-opacity="0.4" />
    <line x1="135" y1="0" x2="135" y2="170" stroke-opacity="0.4" />
    <line x1="210" y1="0" x2="210" y2="170" stroke-opacity="0.4" />
    <line x1="285" y1="0" x2="285" y2="170" stroke-opacity="0.4" />
    <line x1="360" y1="0" x2="360" y2="170" stroke-opacity="0.4" />
    <line x1="420" y1="0" x2="420" y2="170" stroke-opacity="0.4" />
  </g>

  <!-- TOOLS (in slots) -->
  <g stroke="#E2C97E" stroke-width="2.2" fill="none" stroke-linecap="round">
    <!-- DAB TOOL (pointed) -->
    <line x1="190" y1="240" x2="190" y2="370" />
    <circle cx="190" cy="370" r="4" fill="#E2C97E" />
    <line x1="225" y1="240" x2="225" y2="370" />
    <path d="M 222 370 L 228 380" />
    <!-- SCRAPER -->
    <line x1="262" y1="240" x2="262" y2="370" />
    <path d="M 256 370 L 268 384 L 256 380 Z" fill="#E2C97E" />
    <line x1="298" y1="240" x2="298" y2="370" />
    <path d="M 292 370 L 304 384 L 292 380 Z" fill="#E2C97E" />
    <!-- GLASS JARS (silhouette) -->
    <rect x="333" y="280" width="22" height="80" rx="3" fill="#C9A84C" fill-opacity="0.08" />
    <rect x="370" y="280" width="22" height="80" rx="3" fill="#C9A84C" fill-opacity="0.08" />
  </g>

  <!-- LABELS -->
  <g font-family="ui-monospace, 'SF Mono', monospace" font-size="9"
     letter-spacing="1.4" fill="#64748B">
    <text x="170" y="402" text-anchor="middle">DAB-A</text>
    <text x="220" y="402" text-anchor="middle">DAB-B</text>
    <text x="262" y="402" text-anchor="middle">SCR-A</text>
    <text x="298" y="402" text-anchor="middle">SCR-B</text>
    <text x="343" y="402" text-anchor="middle">JAR-A</text>
    <text x="380" y="402" text-anchor="middle">JAR-B</text>
    <text x="430" y="402" text-anchor="middle">CASE</text>
  </g>

  <g font-family="ui-monospace, 'SF Mono', monospace" font-size="10"
     letter-spacing="1.4">
    <text x="200" y="180" fill="#C9A84C">7-PIECE PRECISION SET</text>
    <text x="200" y="200" fill="#64748B">316 STAINLESS STEEL · MICROFIBER ROLL CASE</text>
  </g>


  <!-- FOOTER STRIP -->
  <g font-family="ui-monospace, 'SF Mono', monospace" letter-spacing="2">
    <text x="36" y="514" font-size="9" fill="#64748B">
      ENGINEERED // FORGED // VERIFIED
    </text>
  </g>

  <!-- TF MONOGRAM -->
  <g transform="translate(710, 530)">
    <rect width="54" height="36" fill="none" stroke="#C9A84C" stroke-opacity="0.6" />
    <text x="27" y="24" text-anchor="middle"
          font-family="'Helvetica Neue', Arial, sans-serif"
          font-size="14" font-weight="800" letter-spacing="3"
          fill="#C9A84C">TF</text>
  </g>

  <!-- DIM LINE TICKERS -->
  <g stroke="#0D9488" stroke-opacity="0.35" stroke-width="1">
    <line x1="36" y1="140" x2="36" y2="490" />
    <line x1="32" y1="140" x2="40" y2="140" />
    <line x1="32" y1="315" x2="40" y2="315" />
    <line x1="32" y1="490" x2="40" y2="490" />
    <line x1="764" y1="140" x2="764" y2="490" />
    <line x1="760" y1="140" x2="768" y2="140" />
    <line x1="760" y1="315" x2="768" y2="315" />
    <line x1="760" y1="490" x2="768" y2="490" />
  </g>
</svg>
